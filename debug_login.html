<h1>Login</h1>

<form id="login-form">
    <div id="error-message" class="alert alert-danger" style="display: none; margin-bottom: 1rem;"></div>

    <input type="email" id="email" name="email" placeholder="Email" required>

    <input type="password" id="password" name="password" placeholder="Password" required>

    <button type="submit" id="login-button">Login</button>

</form>

</div>

<script>
    const loginForm = document.getElementById('login-form');
    const loginButton = document.getElementById('login-button');
    const errorMessageDiv = document.getElementById('error-message');

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        loginButton.disabled = true;
        loginButton.textContent = 'Logging in...';
        errorMessageDiv.style.display = 'none';

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
            // 1. Sign in with Firebase on the client
            const userCredential = await firebase.auth().signInWithEmailAndPassword(email, password);
            
            // 2. Get the ID token from the signed-in user
            const idToken = await userCredential.user.getIdToken();

            // 3. Send the ID token to your server for verification and session creation
            const response = await fetch('/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ idToken: idToken }),
            });

            if (response.ok) {
                // 4. If server login is successful, redirect to the dashboard
                window.location.href = '/';
            } else {
                const errorData = await response.json();
                throw new Error(errorData.error || 'Server validation failed.');
            }
        } catch (error) {
            errorMessageDiv.textContent = error.message;
            errorMessageDiv.style.display = 'block';
            loginButton.disabled = false;
            loginButton.textContent = 'Login';
        }
    });
</script>

                <script>
                    const menuToggle = document.getElementById('menu-toggle');
                    const sidebar = document.querySelector('.sidebar');
                    const content = document.querySelector('.content');

                    if (menuToggle && sidebar) {
                        menuToggle.addEventListener('click', () => {
                            sidebar.classList.toggle('is-open');
                        });

                        content.addEventListener('click', () => {
                            if (sidebar.classList.contains('is-open')) {
                                sidebar.classList.remove('is-open');
                            }
                        });
                    }

                    // --- Clock and Calendar Logic ---
                    document.addEventListener('DOMContentLoaded', () => {
                        const hourHand = document.getElementById('hour-hand');
                        const minuteHand = document.getElementById('minute-hand');
                        const secondHand = document.getElementById('second-hand');
                        const digitalClock = document.getElementById('digital-clock');
                        const mobileClock = document.getElementById('mobile-clock');

                        function setDate() {
                            const now = new Date();

                            if (secondHand) { // Analog clock elements exist
                                const seconds = now.getSeconds();
                                const secondsDegrees = ((seconds / 60) * 360) + 90;
                                secondHand.style.transform = `rotate(${secondsDegrees}deg)`;

                                const minutes = now.getMinutes();
                                const minutesDegrees = ((minutes / 60) * 360) + ((seconds / 60) * 6) + 90;
                                minuteHand.style.transform = `rotate(${minutesDegrees}deg)`;

                                const hours = now.getHours();
                                const hoursDegrees = ((hours / 12) * 360) + ((minutes / 60) * 30) + 90;
                                hourHand.style.transform = `rotate(${hoursDegrees}deg)`;
                            }

                            if (digitalClock) {
                                digitalClock.textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                            }

                            if (mobileClock) {
                                mobileClock.textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                            }
                        }

                        setInterval(setDate, 1000);
                        setDate();
                    });
                </script>
                <script>
                    const tailwindSwal = Swal.mixin({
                        customClass: {
                            popup: 'swal-custom-popup',
                            title: 'swal-custom-title',
                            confirmButton: 'btn btn-primary',
                            cancelButton: 'btn btn-secondary',
                            actions: 'swal-custom-actions'
                        },
                        buttonsStyling: false,
                        background: '#ffffff',
                        backdrop: 'rgba(15, 23, 42, 0.4)'
                    });

                    function confirmDelete(form, title = 'Are you sure?', text = "You won't be able to revert this!") {
                        const e = window.event || event;
                        if (e) e.preventDefault();

                        tailwindSwal.fire({
                            title: title,
                            text: text,
                            icon: 'warning',
                            showCancelButton: true,
                            confirmButtonText: 'Yes, delete it!'
                        }).then((result) => {
                            if (result.isConfirmed) {
                                form.submit();
                            }
                        });
                    }

                    function confirmUpdate(form, title = 'Confirm Update', text = "Are you sure you want to save these changes?") {
                        const e = window.event || event;
                        if (e) e.preventDefault();

                        tailwindSwal.fire({
                            title: title,
                            text: text,
                            icon: 'question',
                            showCancelButton: true,
                            confirmButtonText: 'Yes, update it!'
                        }).then((result) => {
                            if (result.isConfirmed) {
                                form.submit();
                            }
                        });
                    }
                </script>
                <script>
                    // Automatically wrap all tables in .table-responsive for horizontal scrolling
                    document.addEventListener('DOMContentLoaded', () => {
                        const tables = document.querySelectorAll('table');
                        tables.forEach(table => {
                            if (!table.parentElement.classList.contains('table-responsive')) {
                                const wrapper = document.createElement('div');
                                wrapper.className = 'table-responsive';
                                table.parentNode.insertBefore(wrapper, table);
                                wrapper.appendChild(table);
                            }
                        });
                    });
                </script>
